services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aihub
      POSTGRES_USER: aihub
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aihub"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://aihub:localdev@db:5432/aihub
      JWT_SECRET: docker-dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

